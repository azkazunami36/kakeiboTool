<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <title>家計簿アプリ</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" type="module"></script>
</head>

<body>
    <header>
        <input id="year" type="text"><span>年</span><input id="month" type="text"><span>月</span><button type="button"
            id="add">➕</button> <button type="button" id="genreEdit">ジャンルを編集</button>
    </header>
    <main>
        <div id="genreInfo">
            <h2>ジャンルごとの金額概要</h2>
        </div>
        <div id="datelist">
        </div>
    </main>
    <div id="genreEditPopup">
        <div class="genreEditWindow">
            <div class="top">
                <p>ジャンルの編集</p>
                <button class="close">❎</button>
            </div>
            <button>ジャンルの追加</button>
            <div class="genrelist">
                <div class></div>
            </div>
        </div>
    </div>
</body>

</html>
